<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>データセンター 詳細</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: #111827;
      --panel-soft: #1f2937;
      --line: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 20px 42px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 26px; line-height: 1.25; }
    h2 { margin: 0 0 14px; font-size: 19px; }
    h3 { margin: 16px 0 8px; font-size: 14px; color: var(--muted); }
    a { color: var(--accent); }
    .back { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .subtitle { margin-top: 8px; color: var(--muted); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin: 16px 0; }
    .chart { height: 420px; }
    .placeholder { color: var(--muted); padding: 18px 0; }
    .detail-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; }
    .detail-block { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .detail-block.full { grid-column: 1 / -1; }
    .detail-title { color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 3px 0; }
    .timeline-row { display: grid; grid-template-columns: 110px 150px minmax(0, 1fr); gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .timeline-date { color: var(--muted); font-size: 13px; }
    .timeline-current { font-weight: 700; }
    .timeline-summary { color: #d1d5db; overflow-wrap: anywhere; }
    @media (max-width: 760px) {
      header { display: block; }
      .back { display: inline-block; margin-bottom: 10px; }
      .detail-grid { grid-template-columns: 1fr; }
      .timeline-row { grid-template-columns: 1fr; gap: 4px; }
      .chart { height: 340px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>データセンター</h1>
        <div class="subtitle">現在の判断: <strong>判断レコードなし</strong>　／　信頼度 ―</div>
      </div>
      <a class="back" href="../macro-dashboard.html">← マクロ判断一覧へ</a>
    </header>
    <section class="card">
      <h2>時系列チャート</h2>
      <div class="placeholder">判断レコードなし</div>
    </section>
    <section class="card">
      <h2>今週の判断詳細</h2>
      <div class="placeholder">判断レコードなし</div>
    </section>
    <section class="card">
      <h2>過去判断タイムライン</h2>
      <div class="placeholder">判断レコードなし</div>
    </section>
  </main>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const chartPayload = {"actual": [], "forecasts": []};
    const chartElement = document.getElementById("score-chart");
    if (chartElement && window.LightweightCharts) {
      const chart = LightweightCharts.createChart(chartElement, {
        layout: { background: { color: "#111827" }, textColor: "#e5e7eb" },
        grid: { vertLines: { color: "#1f2937" }, horzLines: { color: "#1f2937" } },
        rightPriceScale: { borderColor: "#374151" },
        timeScale: { borderColor: "#374151" },
        height: chartElement.clientHeight,
      });
      const fixedScoreScale = () => ({ priceRange: { minValue: -3, maxValue: 3 } });
      const actual = chart.addLineSeries({
        color: "#38bdf8",
        lineWidth: 3,
        title: "実判断スコア",
        autoscaleInfoProvider: fixedScoreScale,
      });
      actual.setData(chartPayload.actual);
      chartPayload.forecasts.forEach((item) => {
        const series = chart.addLineSeries({
          color: item.color,
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Dashed,
          title: item.label,
          autoscaleInfoProvider: fixedScoreScale,
        });
        series.setData(item.data);
      });
      chart.priceScale("right").applyOptions({ autoScale: false, scaleMargins: { top: 0.1, bottom: 0.1 } });
      chart.timeScale().fitContent();
      window.addEventListener("resize", () => {
        chart.applyOptions({ width: chartElement.clientWidth, height: chartElement.clientHeight });
      });
    }
  </script>
</body>
</html>
